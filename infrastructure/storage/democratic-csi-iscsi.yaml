apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-iscsi
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://democratic-csi.github.io/charts/
    chart: democratic-csi
    targetRevision: 0.15.1
    helm:
      releaseName: iscsi
      values: |
        csiDriver:
          name: iscsi
        driver:
          config:
            driver: freenas-api-iscsi
            httpConnection:
              protocol: http
              host: 10.10.10.20
              port: 80
              apiKey: 1-SSYhDEAHJEeyX1ZT60TwOuAD537JMigon7LGZdv7aB9Cj2sjEV7sHNXKv0IAsapO
              allowInsecure: true
            iscsi:
              targetPortal: "10.10.10.20:3260"
              namePrefix: csi-
              nameSuffix: "-clustera"
              targetGroups:
                - targetGroupPortalGroup: 1
                  targetGroupInitiatorGroup: 2
                  targetGroupAuthType: None
                  targetGroupAuthGroup: null
              extentInsecureTpc: true
              extentXenCompat: false
              extentDisablePhysicalBlocksize: true
              extentAvailThreshold: 0
              extentBlocksize: 512
              extentRpm: SSD
            zfs:
              datasetParentName: hba-ssd/iscsi/v
              detachedSnapshotsDatasetParentName: hba-ssd/iscsi/s
              zvolEnableReservation: false
        storageClasses:
          - name: iscsi
            defaultClass: false
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: ext4
              detachedVolumesFromSnapshots: "false"
        volumeSnapshotClasses:
          - name: iscsi
            parameters:
              detachedSnapshots: "true"
  destination:
    name: in-cluster
    namespace: storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
