apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-privileged-containers

spec:
  admission: true
  background: true
  emitWarning: false
  validationFailureAction: Audit

  rules:
    - name: disallow-privileged-containers
      skipBackgroundRequests: false

      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - Rollout
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
              names:
                - cilium
          - resources:
              namespaces:
                - storage
              names:
                - iscsi-democratic-csi-node
                - nfs-democratic-csi-node

      validate:
        message: "Privileged containers are not allowed."
        foreach:
          - list: "request.object.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || false }}"
                    operator: Equals
                    value: true

          - list: "request.object.spec.template.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || false }}"
                    operator: Equals
                    value: true
