apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag

spec:
  admission: true
  background: true
  emitWarning: false
  validationFailureAction: Enforce

  rules:
    - name: require-image-tag
      skipBackgroundRequests: true

      match:
        any:
          - resources:
              kinds:
                - Pod

      validate:
        allowExistingViolations: true
        message: "Images with :latest are not allowed.."

        pattern:
          spec:
            containers:
              - image: "!*:latest"
