apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-iscsi-workload
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
    targetRevision: HEAD
    path: apps/test-iscsi  # Hier wijs je naar de map met je pod/pvc
  destination:
    name: in-cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
