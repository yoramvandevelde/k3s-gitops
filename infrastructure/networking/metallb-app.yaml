apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: 0.14.9
  destination:
    name: in-cluster
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
  - group: metallb.io
    kind: BGPPeer
    name: bgppeers.metallb.io # Specifiek voor dit object
    managedFieldsManagers:
    - kube-controller-manager
    jsonPointers:
    - /metadata
