apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.0

    helm:
      values: |
        controller:
          service:
            annotations:
              metallb.universe.tf/loadBalancerIPs: 10.10.99.80
          metrics:
            enabled: true
            serviceMonitor:
              enabled: false
              additionalLabels:
                release: kube-prometheus-stack

  destination:
    name: in-cluster
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true
