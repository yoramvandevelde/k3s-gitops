apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: goldilocks
    targetRevision: 8.0.2
    helm:
      values: |
        controller:
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
        dashboard:
          enabled: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - host: goldilocks.local.sifft.io
                paths:
                  - path: /
                    type: Prefix
            tls:
              - hosts:
                  - goldilocks.local.sifft.io
                secretName: wildcard-local-sifft-io-tls
  destination:
    name: in-cluster
    namespace: goldilocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
