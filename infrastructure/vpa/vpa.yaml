apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: vpa
    targetRevision: 4.4.6
    helm:
      values: |
        # Only the recommender is needed; Goldilocks reads its suggestions.
        # Admission controller and updater are disabled to prevent VPA from
        # automatically mutating pod resource requests.
        admissionController:
          enabled: false
        updater:
          enabled: false
        recommender:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 500Mi
  destination:
    name: in-cluster
    namespace: vpa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
