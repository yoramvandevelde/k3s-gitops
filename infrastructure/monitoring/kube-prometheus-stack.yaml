apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.3.2
    helm:
      values: |
        grafana:
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-oidc-secret
                key: client_secret
          grafana.ini:
            server:
              root_url: https://grafana.local.sifft.io
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: MEK6kjWYdWSThyKYDAGxecCyA6gZ9vYUxiOMkEsS
              client_secret: "${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
              scopes: openid profile email
              auth_url: https://authentik.local.sifft.io/application/o/authorize/
              token_url: https://authentik.local.sifft.io/application/o/token/
              api_url: https://authentik.local.sifft.io/application/o/userinfo/
              role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || 'Viewer'"
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana.local.sifft.io
            tls:
              - secretName: wildcard-local-sifft-io-tls
                hosts:
                  - grafana.local.sifft.io
          persistence:
            enabled: true
            type: sts
            storageClassName: nfs
            size: 2Gi
          service:
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: 10.10.99.81
          initChownData:
            enabled: true
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
          service:
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: 10.10.99.82
        alertmanager:
          service:
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: 10.10.99.83
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[].metadata.creationTimestamp | select(. == null)
        - .spec.volumeClaimTemplates[].status
        - .spec.volumeClaimTemplates[].spec.volumeMode
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
