securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

config:
  oidc:
    externalSecret:
      enabled: true
      name: headlamp-oidc

volumes:
  - name: headlamp-config
    emptyDir: {}
  - name: headlamp-tmp
    emptyDir: {}

volumeMounts:
  - name: headlamp-config
    mountPath: /home/headlamp/.config
  - name: headlamp-tmp
    mountPath: /tmp
