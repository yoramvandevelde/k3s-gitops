apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-iscsi-dev 
  namespace: argocd
spec:
  project: default  
  source:
    path: apps/test-iscsi/overlays/dev
    repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
    targetRevision: HEAD
  destination:
    namespace: test-dev
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  
