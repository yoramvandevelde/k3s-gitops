apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tuwunel-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Matrix clients send large payloads (e.g. file uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - matrix.sifft.io
      secretName: wildcard-sifft-io-tls
  rules:
    - host: matrix.sifft.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tuwunel-svc
                port:
                  number: 80
