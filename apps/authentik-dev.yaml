apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2026.2.2
      helm:
        valueFiles:
          - $values/apps/authentik/values.yaml
    - repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
      targetRevision: HEAD
      path: apps/authentik
      directory:
        exclude: "values.yaml"
  destination:
    name: in-cluster
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
