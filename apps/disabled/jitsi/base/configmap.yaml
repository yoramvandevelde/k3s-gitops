apiVersion: v1
kind: ConfigMap
metadata:
  name: jitsi-config
  namespace: jitsi
data:
  # Public-facing domain
  PUBLIC_URL: "https://meet.sifft.io"

  # JVB advertised address for media traffic
  JVB_ADVERTISE_IPS: "jvb.sifft.io"
  JVB_PORT: "10000"

  # Authentication mode
  ENABLE_AUTH: "1"
  ENABLE_GUESTS: "1"
  AUTH_TYPE: "internal"

  # WebSocket signaling (required in Kubernetes)
  ENABLE_XMPP_WEBSOCKET: "1"

  TZ: "Europe/Amsterdam"
