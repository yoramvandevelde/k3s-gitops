apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iscsi-test-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: iscsi # Check of dit exact de naam is van je StorageClass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-test
  template:
    metadata:
      labels:
        app: storage-test
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - mountPath: "/usr/share/nginx/html"
          name: my-storage
      volumes:
      - name: my-storage
        persistentVolumeClaim:
          claimName: iscsi-test-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: storage-test-svc
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: storage-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
