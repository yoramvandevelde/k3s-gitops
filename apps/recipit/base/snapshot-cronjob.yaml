apiVersion: batch/v1
kind: CronJob
metadata:
  name: recipit-snapshot
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: recipit-snapshot
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
          - name: snapshot
            image: alpine/k8s:1.35.4
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              privileged: false
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/sh
            - -c
            - |
              cat > /tmp/snapshot.yaml << EOF
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshot
              metadata:
                name: recipit-snapshot-$(date +%Y%m%d-%H%M)
                namespace: recipit-dev
              spec:
                volumeSnapshotClassName: iscsi
                source:
                  persistentVolumeClaimName: recipit-pvc
              EOF
              echo "Applying snapshot:"
              cat /tmp/snapshot.yaml
              kubectl apply -f /tmp/snapshot.yaml && echo "Success" || echo "Failed"
          volumes:
          - name: tmp
            emptyDir: {}
