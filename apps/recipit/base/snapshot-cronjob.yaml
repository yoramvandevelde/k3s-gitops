apiVersion: batch/v1
kind: CronJob
metadata:
  name: recipit-snapshot
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: recipit-snapshot
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
          - name: snapshot
            image: alpine/k8s:1.35.4
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              privileged: false
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            command:
            - /bin/sh
            - -c
            - |
              printf 'apiVersion: snapshot.storage.k8s.io/v1\nkind: VolumeSnapshot\nmetadata:\n  name: recipit-snapshot-%s\n  namespace: recipit-dev\nspec:\n  volumeSnapshotClassName: iscsi\n  source:\n    persistentVolumeClaimName: recipit-pvc\n' "$(date +%Y%m%d-%H%M)" > /tmp/snapshot.yaml
              cat /tmp/snapshot.yaml
              kubectl apply -f /tmp/snapshot.yaml && echo "Success" || echo "Failed"
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: tmp
            emptyDir: {}
