apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recipit-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: iscsi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipit-deploy
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: recipit-deploy
  template:
    metadata:
      labels:
        app: recipit-deploy
    spec:
      containers:
      - name: recipit
        image: ghcr.io/yoramvandevelde/recipit:11fceef1baab60937a325ec317fc4b2ae9b9ca70
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - mountPath: /srv/data
          name: recipit-storage
        env:
        - name: DATABASE_PATH
          value: /srv/data/recepten.db
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: recipit-ha
              key: admin_user
        - name: ADMIN_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: recipit-ha
              key: admin_password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: recipit-ha
              key: secret_key
        - name: HA_URL
          valueFrom:
            secretKeyRef:
              name: recipit-ha
              key: url
        - name: HA_TOKEN
          valueFrom:
            secretKeyRef:
              name: recipit-ha
              key: token
      volumes:
      - name: recipit-storage
        persistentVolumeClaim:
          claimName: recipit-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: recipit-svc
spec:
  selector:
    app: recipit-deploy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
