# Default deny all ingress and egress for the entire namespace
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
spec:
  endpointSelector: {}
  ingress:
    - {}
  egress:
    - {}
---
# Forgejo: ingress from ingress-nginx on 3000, ingress from world on 2222 (SSH via MetalLB)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: forgejo
spec:
  endpointSelector:
    matchLabels:
      app: forgejo
  ingress:
    # HTTP via ingress-nginx
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: ingress-nginx
            io.kubernetes.pod.namespace: ingress-nginx
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # SSH via MetalLB (komt binnen als world)
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "2222"
              protocol: TCP
  egress:
    # Mirrors, webhooks, OAuth (HTTPS)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # SSH-based git remotes
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "22"
              protocol: TCP
    # kube-dns
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
