apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo-secrets-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
    targetRevision: HEAD
    path: apps/forgejo
  destination:
    name: in-cluster
    namespace: forgejo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
