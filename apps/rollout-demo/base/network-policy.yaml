# Default deny all ingress and egress for the entire namespace
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
spec:
  endpointSelector: {}
  ingress:
    - {}
  egress:
    - {}
---
# rollout-demo: egress to kube-dns only (no inbound traffic — canary demo, no service/ingress)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rollout-demo
spec:
  endpointSelector:
    matchLabels:
      app: rollout-demo
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
