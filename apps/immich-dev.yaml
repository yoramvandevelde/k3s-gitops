apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://immich-app.github.io/immich-charts
      chart: immich
      targetRevision: 0.11.1
      helm:
        valueFiles:
          - $values/apps/immich/values-dev.yaml
    - repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/yoramvandevelde/k3s-gitops.git
      targetRevision: HEAD
      path: apps/immich
  destination:
    name: in-cluster
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
