apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
data:
  turnserver.conf: |
    listening-port=3478
    # Set this to the WAN IP of your router (the public IP clients connect to)
    realm=sifft.io
    use-auth-secret
    static-auth-secret-file=/run/secrets/coturn/turn-secret
    min-port=49152
    max-port=49161
    no-cli
    no-multicast-peers
    # Block relay to RFC-1918 ranges to prevent SSRF into the homelab
    denied-peer-ip=10.0.0.0-10.255.255.255
    denied-peer-ip=192.168.0.0-192.168.255.255
    denied-peer-ip=172.16.0.0-172.31.255.255
    log-file=stdout
    simple-log
