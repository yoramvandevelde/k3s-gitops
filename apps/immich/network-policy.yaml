# Machine learning: ingress only from immich-server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: immich-machine-learning
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich-machine-learning
  ingress:
    - fromEndpoints:
