# Top-level env vars apply to the immich server
controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: immich-postgresql
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME: immich
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: db-password
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: redis-password
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi

immich:
  persistence:
    library:
      existingClaim: immich-library

server:
  ingress:
    main:
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "500m"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      hosts:
        - host: immich.local.sifft.io
          paths:
            - path: /
              service:
                identifier: main
      tls:
        - hosts:
            - immich.local.sifft.io
          secretName: wildcard-local-sifft-io-tls

valkey:
  enabled: true
  controllers:
    main:
      containers:
        main:
          args: ["--requirepass", "$(VALKEY_PASSWORD)"]
          env:
            VALKEY_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: redis-password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
  persistence:
    data:
      type: persistentVolumeClaim
      size: 1Gi
      storageClass: iscsi
      accessMode: ReadWriteOnce

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 4Gi
  persistence:
    cache:
      type: persistentVolumeClaim
      size: 10Gi
      storageClass: iscsi
      accessMode: ReadWriteOnce
